{% extends "base.html" %}
{% block title %}Room Not Found — NITI Learn{% endblock %}
{% block content %}
<div class="container py-5 text-center">
  <i class="bi bi-broadcast-pin" style="font-size:4rem; color:var(--border);"></i>
  <h3 class="mt-3" style="color:var(--navy);">Room Not Found or Ended</h3>
  <p style="color:var(--text-muted);">The host may have ended the session or the room has expired.</p>
  <a href="{{ url_for('live.index') }}" class="btn-gold mt-2">
    <i class="bi bi-arrow-left me-1"></i>Back to Rooms
  </a>
</div>
{% endblock %}
