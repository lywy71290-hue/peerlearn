{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center py-5" style="background: linear-gradient(135deg, var(--dark) 0%, var(--dark-2) 100%);">
  <div class="auth-card">

    <!-- Logo -->
    <div class="text-center mb-4">
      <div class="brand-icon mb-2" style="font-size:2.5rem;"><i class="bi bi-play-circle-fill"></i></div>
      <div class="auth-logo">Peer<span class="text-accent">Learn</span></div>
      <p class="text-muted small mt-1">Welcome back! Sign in to continue</p>
    </div>

    <form method="POST" action="{{ url_for('auth.login') }}">
      <div class="mb-3">
        <label class="form-label-custom" for="email">Email Address</label>
        <div class="input-group">
          <span class="input-group-text" style="background:var(--dark-3); border-color:rgba(255,255,255,.1); color:var(--muted);">
            <i class="bi bi-envelope"></i>
          </span>
          <input type="email" name="email" id="email" class="form-control form-control-custom"
                 placeholder="you@example.com" required autocomplete="email">
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label-custom" for="password">Password</label>
        <div class="input-group">
          <span class="input-group-text" style="background:var(--dark-3); border-color:rgba(255,255,255,.1); color:var(--muted);">
            <i class="bi bi-lock"></i>
          </span>
          <input type="password" name="password" id="password" class="form-control form-control-custom"
                 placeholder="••••••••" required autocomplete="current-password">
        </div>
      </div>

      <div class="d-flex justify-content-between align-items-center mb-4">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" name="remember" id="remember">
          <label class="form-check-label text-muted small" for="remember">Remember me</label>
        </div>
      </div>

      <button type="submit" class="btn btn-primary-custom btn-lg w-100">
        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
      </button>
    </form>

    <hr style="border-color: var(--border); margin: 1.5rem 0;">

    <p class="text-center text-muted small mb-0">
      Don't have an account?
      <a href="{{ url_for('auth.register') }}" style="color: var(--accent); font-weight:600;">Sign up free</a>
    </p>
  </div>
</div>
{% endblock %}
