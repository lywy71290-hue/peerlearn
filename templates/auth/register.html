{% extends "base.html" %}
{% block title %}Sign Up{% endblock %}

{% block content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center py-5" style="background: linear-gradient(135deg, var(--dark) 0%, var(--dark-2) 100%);">
  <div class="auth-card">

    <!-- Logo -->
    <div class="text-center mb-4">
      <div class="brand-icon mb-2" style="font-size:2.5rem;"><i class="bi bi-play-circle-fill"></i></div>
      <div class="auth-logo">Peer<span class="text-accent">Learn</span></div>
      <p class="text-muted small mt-1">Create your free account and start learning</p>
    </div>

    <form method="POST" action="{{ url_for('auth.register') }}">
      <div class="mb-3">
        <label class="form-label-custom" for="username">Username</label>
        <div class="input-group">
          <span class="input-group-text" style="background:var(--dark-3); border-color:rgba(255,255,255,.1); color:var(--muted);">
            <i class="bi bi-person"></i>
          </span>
          <input type="text" name="username" id="username" class="form-control form-control-custom"
                 placeholder="Choose a username" required minlength="3" maxlength="50" autocomplete="username">
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label-custom" for="email">Email Address</label>
        <div class="input-group">
          <span class="input-group-text" style="background:var(--dark-3); border-color:rgba(255,255,255,.1); color:var(--muted);">
            <i class="bi bi-envelope"></i>
          </span>
          <input type="email" name="email" id="email" class="form-control form-control-custom"
                 placeholder="you@example.com" required autocomplete="email">
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label-custom" for="password">Password</label>
        <div class="input-group">
          <span class="input-group-text" style="background:var(--dark-3); border-color:rgba(255,255,255,.1); color:var(--muted);">
            <i class="bi bi-lock"></i>
          </span>
          <input type="password" name="password" id="password" class="form-control form-control-custom"
                 placeholder="Min. 8 characters" required minlength="8" autocomplete="new-password">
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label-custom" for="confirm_password">Confirm Password</label>
        <div class="input-group">
          <span class="input-group-text" style="background:var(--dark-3); border-color:rgba(255,255,255,.1); color:var(--muted);">
            <i class="bi bi-lock-fill"></i>
          </span>
          <input type="password" name="confirm_password" id="confirm_password" class="form-control form-control-custom"
                 placeholder="Repeat your password" required autocomplete="new-password">
        </div>
      </div>

      <button type="submit" class="btn btn-primary-custom btn-lg w-100">
        <i class="bi bi-person-plus me-2"></i>Create Account
      </button>
    </form>

    <hr style="border-color: var(--border); margin: 1.5rem 0;">

    <p class="text-center text-muted small mb-0">
      Already have an account?
      <a href="{{ url_for('auth.login') }}" style="color: var(--accent); font-weight:600;">Sign in</a>
    </p>
  </div>
</div>
{% endblock %}
