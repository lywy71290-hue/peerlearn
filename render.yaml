services:
  - type: web
    name: peerlearn-web
    env: python
    buildCommand: "pip install -r requirements.txt && flask db upgrade"
    startCommand: "gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: peerlearn-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CLOUDINARY_CLOUD_NAME
        value: ""     # ← من Cloudinary Dashboard
      - key: CLOUDINARY_API_KEY
        value: ""     # ← من Cloudinary Dashboard
      - key: CLOUDINARY_API_SECRET
        value: ""     # ← من Cloudinary Dashboard

databases:
  - name: peerlearn-db
    databaseName: peerlearning
    user: peerlearn_user
